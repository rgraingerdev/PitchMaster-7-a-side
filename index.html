<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PitchMaster | 7-a-Side Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="app-container">
        <aside class="sidebar">
            <header>
                <h1>PitchMaster</h1>
                <p>7-a-Side Match Planner</p>
            </header>

            <div class="input-group">
                <input type="text" id="player-input" placeholder="e.g. Leo, Cristiano..." autocomplete="off">
                <button id="add-player-btn" class="primary-btn">Add</button>
            </div>

            <div class="players-list-container">
                <div class="list-header">
                    <h3>Squad (<span id="player-count">0</span> / 14 max)</h3>
                    <button id="clear-all-btn" class="text-btn">Clear squad</button>
                </div>
                <ul id="players-list" class="players-list">
                </ul>
            </div>

            <div class="sidebar-footer">
                <div class="settings-group">
                    <label>Number of Match Periods (20 mins):</label>
                    <div class="radio-group">
                        <label><input type="radio" name="num-games" value="1"> 1</label>
                        <label><input type="radio" name="num-games" value="2" checked> 2</label>
                        <label><input type="radio" name="num-games" value="3"> 3</label>
                    </div>
                </div>

                <div class="settings-group">
                    <label>Formation:</label>
                    <select id="formation-select" class="dropdown-select">
                        <option value="2-3-1">2-3-1 (Balanced)</option>
                        <option value="3-2-1">3-2-1 (Defensive)</option>
                        <option value="2-2-2">2-2-2 (Attacking)</option>
                        <option value="1-4-1">1-4-1 (Midfield Control)</option>
                        <option value="3-1-2">3-1-2 (Counter Attack)</option>
                    </select>
                </div>

                <div class="stats-box">
                    <p>Ideal match squad: 10-14 players.</p>
                </div>
                <button id="generate-teams-btn" class="generate-btn" disabled>Generate Match Plans</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="main-header">
                <h2>Match Plans</h2>
                <p>Automated formations. Guaranteed fair playing time across games.</p>
            </header>

            <section id="teams-container" class="teams-section empty-state">
                <div class="empty-message">
                    <div class="icon-placeholder">⏱️</div>
                    <h3>No plans generated yet</h3>
                    <p>Add 7 to 14 players, select the number of games, and click Generate.</p>
                </div>
            </section>
        </main>
    </div>

    <template id="match-template">
        <div class="team-card match-card">
            <div class="team-header">
                <input type="text" class="team-name-input" value="Game 1">
                <span class="team-count"><span class="sub-count">0</span> subs</span>
            </div>

            <div class="vertical-pitch">
                <div class="pitch-lines">
                    <div class="center-line"></div>
                    <div class="center-circle"></div>
                    <div class="penalty-area top"></div>
                    <div class="penalty-area bottom"></div>
                </div>
                <div class="formation-grid">
                    <div class="pos-row row-fwd" id="row-fwd"></div>
                    <div class="pos-row row-mid" id="row-mid"></div>
                    <div class="pos-row row-def" id="row-def"></div>
                    <div class="pos-row row-gk" id="row-gk"></div>
                </div>
            </div>

            <div class="subs-container">
                <h4>Bench</h4>
                <ul class="subs-list"></ul>

                <div class="swaps-section">
                    <h4>Subs at exactly <strong>10 minutes</strong>:</h4>
                    <ul class="swaps-list"></ul>
                </div>
            </div>
        </div>
    </template>

    <script src="app.js"></script>
</body>

</html>
